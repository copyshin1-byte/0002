<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理画面</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0f16;color:#fff;padding:20px;}

button{
margin:4px 2px;
padding:6px 10px;
background:#1f2937;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

input, textarea, select{
width:100%;
margin:6px 0;
padding:6px;
}

.panel{
background:#111827;
padding:12px;
border-radius:8px;
margin-bottom:20px;
}

.item{
background:#1f2937;
padding:8px;
border-radius:6px;
margin:6px 0;
}

.categoryHeader{
background:#374150;
padding:10px;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}
</style>

</head>
<body>

<h2>管理画面</h2>

<button onclick="login()">パスワード入力</button>
<button onclick="logout()">ログアウト</button>

<div id="mainPanel" style="display:none;">

<div class="panel">
<h3>商品追加</h3>

<select id="productCategory"></select>

<input id="pName" placeholder="商品名">
<input id="pImage" placeholder="画像URL">
<input id="pVideo" placeholder="YouTube動画URL">

<textarea id="pDesc" placeholder="説明"></textarea>

<select id="pTag">
<option value="">タグなし</option>
<option value="人気">人気</option>
<option value="更新">更新</option>
</select>

<button onclick="addProduct()">商品追加</button>

<hr>

<div id="productList"></div>

</div>



<div class="panel">

<h3>カテゴリ追加</h3>

<input id="catName">
<input id="catImage" placeholder="カテゴリ画像URL">

<button onclick="addCategory()">カテゴリ追加</button>

</div>



<div class="panel">

<h3>サイトフォント設定</h3>

<select id="fontSelect">

<option value="system-ui">標準フォント</option>
<option value="'Noto Sans JP',sans-serif">Noto Sans JP</option>
<option value="Arial,sans-serif">Arial</option>
<option value="'Orbitron',sans-serif">Orbitron</option>
<option value="'M PLUS 1p',sans-serif">M PLUS</option>

</select>

<button onclick="saveFont()">フォント保存</button>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyBuntfW8chPksWc8xCMVw9LFdqhmbe8Dps",
  authDomain: "project-1903050700199799038.firebaseapp.com",
  projectId: "project-1903050700199799038",
  storageBucket: "project-1903050700199799038.firebasestorage.app",
  messagingSenderId: "338189734914",
  appId: "1:338189734914:web:01997c9526952de07e031b"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);



function normalizeYoutube(url){

if(!url) return "";

if(url.includes("watch?v=")) return url;

if(url.includes("youtu.be/"))
return "https://www.youtube.com/watch?v="+
url.split("youtu.be/")[1].split("?")[0];

if(url.includes("embed/"))
return "https://www.youtube.com/watch?v="+
url.split("embed/")[1].split("?")[0];

return url;

}



const ADMIN_PASSWORD="1234";
const LOGIN_KEY="admin_login_time";
const LOGIN_DURATION=24*60*60*1000;



let categories=[];
let products=[];
let openCategories={};



const productList=document.getElementById("productList");
const productCategory=document.getElementById("productCategory");
const mainPanel=document.getElementById("mainPanel");



window.saveFont=function(){
localStorage.setItem("siteFont",
document.getElementById("fontSelect").value);
alert("保存しました");
}



function checkAutoLogin(){

const t=localStorage.getItem(LOGIN_KEY);

if(t && Date.now()-t<LOGIN_DURATION)
mainPanel.style.display="block";

}



window.login=function(){

if(prompt("パスワード")==ADMIN_PASSWORD){

localStorage.setItem(LOGIN_KEY,Date.now());
mainPanel.style.display="block";

}

}



window.logout=function(){

localStorage.removeItem(LOGIN_KEY);
location.reload();

}



/* カテゴリ追加 */

window.addCategory=async function(){

const name=catName.value.trim();
const image=catImage.value.trim();

if(!name)return;

await addDoc(collection(db,"categories"),{

name,
image,
order:Date.now(),
updatedAt:Date.now()

});

catName.value="";
catImage.value="";

}



/* 商品追加 */

window.addProduct=async function(){

const category=productCategory.value;
const name=pName.value.trim();
const desc=pDesc.value;

const image=normalizeYoutube(pImage.value);
const video=normalizeYoutube(pVideo.value);

const tag=pTag.value;

if(!category||!name)return alert("必須項目不足");

await addDoc(collection(db,"products"),{

category,name,desc,image,video,tag,
order:Date.now(),
updatedAt:Date.now()

});

pName.value="";
pDesc.value="";
pImage.value="";
pVideo.value="";

}



/* 商品削除 */

window.deleteProduct=id=>{

if(confirm("削除しますか"))
deleteDoc(doc(db,"products",id))

}



/* カテゴリ削除（商品削除選択付き） */

window.deleteCategory=async function(id){

if(!confirm("カテゴリ削除しますか？")) return;

const deleteProductsToo=
confirm("このカテゴリ内の商品も削除しますか？");

if(deleteProductsToo){

const cat=categories.find(c=>c.id===id);

if(cat){

const targetProducts=
products.filter(p=>p.category===cat.name);

for(const p of targetProducts){
await deleteDoc(doc(db,"products",p.id));
}

}

}

await deleteDoc(doc(db,"categories",id));

}



/* ★カテゴリ編集（商品カテゴリも変更） */

window.editCategory=async function(cat){

const oldName=cat.name;

const name=prompt("カテゴリ名",cat.name);
if(name===null)return;

const image=prompt("画像URL",cat.image||"");

/* カテゴリ更新 */

await updateDoc(doc(db,"categories",cat.id),{

name,
image,
updatedAt:Date.now()

});


/* 商品カテゴリ名更新 */

const targetProducts=
products.filter(p=>p.category===oldName);

for(const p of targetProducts){

await updateDoc(doc(db,"products",p.id),{

category:name

});

}

}



window.moveCategoryUp=async id=>{

const s=[...categories].sort((a,b)=>a.order-b.order);

const i=s.findIndex(c=>c.id===id);

if(i<=0)return;

await updateDoc(doc(db,"categories",s[i].id),{order:s[i-1].order});
await updateDoc(doc(db,"categories",s[i-1].id),{order:s[i].order});

}



window.moveCategoryDown=async id=>{

const s=[...categories].sort((a,b)=>a.order-b.order);

const i=s.findIndex(c=>c.id===id);

if(i>=s.length-1)return;

await updateDoc(doc(db,"categories",s[i].id),{order:s[i+1].order});
await updateDoc(doc(db,"categories",s[i+1].id),{order:s[i].order});

}



function toggleCategory(name){

openCategories[name]=!openCategories[name];
renderProducts();

}



onSnapshot(query(collection(db,"categories"),orderBy("order")),snap=>{

categories=[];
productCategory.innerHTML="";

snap.forEach(d=>{

const data={id:d.id,...d.data()};
categories.push(data);

const opt=document.createElement("option");

opt.value=data.name;
opt.textContent=data.name;

productCategory.appendChild(opt);

});

renderProducts();

});



onSnapshot(query(collection(db,"products"),orderBy("order")),snap=>{

products=[];

snap.forEach(d=>{

products.push({id:d.id,...d.data()});

});

renderProducts();

});



function renderProducts(){

productList.innerHTML="";

categories.forEach(cat=>{

const header=document.createElement("div");

header.className="categoryHeader";

header.innerHTML=`

${openCategories[cat.name]?"▼":"▶"} ${cat.name}

<button onclick="moveCategoryUp('${cat.id}')">▲</button>
<button onclick="moveCategoryDown('${cat.id}')">▼</button>
<button onclick='editCategory(${JSON.stringify(cat)})'>編集</button>
<button onclick="deleteCategory('${cat.id}')">削除</button>

`;

header.onclick=()=>toggleCategory(cat.name);

productList.appendChild(header);


if(!openCategories[cat.name])return;


products

.filter(p=>p.category===cat.name)

.forEach(p=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

${p.name}

<button onclick="moveProductUp('${p.id}')">▲</button>
<button onclick="moveProductDown('${p.id}')">▼</button>
<button onclick='editProduct(${JSON.stringify(p)})'>編集</button>
<button onclick="deleteProduct('${p.id}')">削除</button>

`;

productList.appendChild(div);

});

});

}



checkAutoLogin()

</script>

</body>
</html>

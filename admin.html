<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理画面</title>

<style>
/* ===== Admin: Cyberpunk Utility (CSS only) ===== */
:root{
  --bg:#070b14;
  --panel:rgba(8,14,28,.72);
  --ink:#eafaff;
  --muted:rgba(231,250,255,.70);
  --c1:#00eaff;
  --c2:#00ffa6;
  --c3:#b100ff;
  --line:rgba(0,234,255,.22);
  --shadow:0 18px 60px rgba(0,0,0,.55);
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans JP",Arial;
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(0,234,255,.12), transparent 60%),
    radial-gradient(900px 520px at 80% 10%, rgba(177,0,255,.10), transparent 60%),
    linear-gradient(180deg, #020617, #000814);
  color:var(--ink);
  padding:22px;
}

.panel{
  background:
    radial-gradient(900px 200px at 20% 0%, rgba(0,234,255,.10), transparent 55%),
    linear-gradient(180deg, rgba(8,16,34,.78), rgba(0,0,0,.55));
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:var(--shadow);
  margin:14px 0;
  position:relative;
  overflow:hidden;
}

.panel:before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:18px;
  padding:2px;
  background:linear-gradient(135deg, rgba(0,234,255,.35), rgba(177,0,255,.25), rgba(0,255,166,.25));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
  opacity:.55;
}

.categoryHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 8px 14px;
  border-bottom:1px solid rgba(0,234,255,.18);
  margin-bottom:14px;
}

.categoryHeader h2{
  margin:0;
  font-size:16px;
  letter-spacing:1px;
  font-weight:800;
  color:var(--ink);
  text-shadow:0 0 12px rgba(0,234,255,.14);
}

.item{
  padding:12px;
  margin:10px 0;
  border-radius:14px;
  border:1px solid rgba(0,234,255,.14);
  background:
    linear-gradient(180deg, rgba(0,10,30,.62), rgba(0,0,0,.42));
  box-shadow:
    0 14px 44px rgba(0,0,0,.35),
    inset 0 0 0 1px rgba(255,255,255,.02);
}

button{
  margin:6px 4px 0 0;
  padding:10px 12px;
  background:
    linear-gradient(180deg, rgba(0,234,255,.18), rgba(0,0,0,.35));
  color:var(--ink);
  border:1px solid rgba(0,234,255,.28);
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
  letter-spacing:.5px;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  box-shadow:0 12px 28px rgba(0,0,0,.35);
}

button:hover{
  transform:translateY(-1px);
  border-color:rgba(0,234,255,.75);
  box-shadow:
    0 16px 46px rgba(0,0,0,.5),
    0 0 18px rgba(0,234,255,.18);
}

button:active{ transform:translateY(0px) scale(.99); }

input, textarea, select{
  width:100%;
  padding:12px 12px;
  margin:8px 0 12px;
  border-radius:12px;
  border:1px solid rgba(0,234,255,.22);
  background:rgba(0,0,0,.45);
  color:var(--ink);
  outline:none;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}

input:focus, textarea:focus, select:focus{
  border-color:rgba(0,234,255,.85);
  box-shadow:
    0 0 0 4px rgba(0,234,255,.12),
    0 0 18px rgba(0,234,255,.18);
}

textarea{ min-height:110px; resize:vertical; }

@media(max-width:720px){
  body{ padding:14px; }
  .panel{ padding:14px; border-radius:16px; }
  button{ width:100%; margin:6px 0 0; }
}

</style>

</head>
<body>

<h2>管理画面</h2>

<button onclick="login()">パスワード入力</button>
<button onclick="logout()">ログアウト</button>

<div id="mainPanel" style="display:none;">

<div class="panel">
<h3>商品追加</h3>

<select id="productCategory"></select>

<input id="pName" placeholder="商品名">
<input id="pImage" placeholder="画像URL">
<input id="pVideo" placeholder="YouTube動画URL">

<textarea id="pDesc" placeholder="説明"></textarea>

<select id="pTag">
<option value="">タグなし</option>
<option value="人気">人気</option>
<option value="更新">更新</option>
</select>

<button onclick="addProduct()">商品追加</button>

<hr>

<div id="productList"></div>

</div>



<div class="panel">

<h3>カテゴリ追加</h3>

<input id="catName">
<input id="catImage" placeholder="カテゴリ画像URL">

<button onclick="addCategory()">カテゴリ追加</button>

</div>



<div class="panel">

<h3>サイトフォント設定</h3>

<select id="fontSelect">

<option value="system-ui">標準フォント</option>
<option value="'Noto Sans JP',sans-serif">Noto Sans JP</option>
<option value="Arial,sans-serif">Arial</option>
<option value="'Orbitron',sans-serif">Orbitron</option>
<option value="'M PLUS 1p',sans-serif">M PLUS</option>

</select>

<button onclick="saveFont()">フォント保存</button>

</div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
updateDoc,
onSnapshot,
query,
orderBy
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain: "project-3088108151926999605.firebaseapp.com",
projectId: "project-3088108151926999605",
storageBucket: "project-3088108151926999605.firebasestorage.app",
messagingSenderId: "331871777494",
appId: "1:331871777494:web:8de28a405de387f7240f77"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);



function normalizeYoutube(url){

if(!url) return "";

if(url.includes("watch?v=")) return url;

if(url.includes("youtu.be/"))
return "https://www.youtube.com/watch?v="+
url.split("youtu.be/")[1].split("?")[0];

if(url.includes("embed/"))
return "https://www.youtube.com/watch?v="+
url.split("embed/")[1].split("?")[0];

return url;

}



const ADMIN_PASSWORD="1234";
const LOGIN_KEY="admin_login_time";
const LOGIN_DURATION=24*60*60*1000;



let categories=[];
let products=[];
let openCategories={};



const productList=document.getElementById("productList");
const productCategory=document.getElementById("productCategory");
const mainPanel=document.getElementById("mainPanel");



window.saveFont=function(){
localStorage.setItem("siteFont",
document.getElementById("fontSelect").value);
alert("保存しました");
}



function checkAutoLogin(){

const t=localStorage.getItem(LOGIN_KEY);

if(t && Date.now()-t<LOGIN_DURATION)
mainPanel.style.display="block";

}



window.login=function(){

if(prompt("パスワード")==ADMIN_PASSWORD){

localStorage.setItem(LOGIN_KEY,Date.now());
mainPanel.style.display="block";

}

}



window.logout=function(){

localStorage.removeItem(LOGIN_KEY);
location.reload();

}



/* カテゴリ追加 */

window.addCategory=async function(){

const name=catName.value.trim();
const image=catImage.value.trim();

if(!name)return;

await addDoc(collection(db,"categories"),{

name,
image,
order:Date.now(),
updatedAt:Date.now()

});

catName.value="";
catImage.value="";

}



/* 商品追加 */

window.addProduct=async function(){

const category=productCategory.value;
const name=pName.value.trim();
const desc=pDesc.value;

const image=normalizeYoutube(pImage.value);
const video=normalizeYoutube(pVideo.value);

const tag=pTag.value;

if(!category||!name)return alert("必須項目不足");

await addDoc(collection(db,"products"),{

category,name,desc,image,video,tag,
order:Date.now(),
updatedAt:Date.now()

});

pName.value="";
pDesc.value="";
pImage.value="";
pVideo.value="";

}



/* 商品削除 */

window.deleteProduct=id=>{

if(confirm("削除しますか"))
deleteDoc(doc(db,"products",id))

}



/* カテゴリ削除（商品削除選択付き） */

window.deleteCategory=async function(id){

if(!confirm("カテゴリ削除しますか？")) return;

const deleteProductsToo=
confirm("このカテゴリ内の商品も削除しますか？");

if(deleteProductsToo){

const cat=categories.find(c=>c.id===id);

if(cat){

const targetProducts=
products.filter(p=>p.category===cat.name);

for(const p of targetProducts){
await deleteDoc(doc(db,"products",p.id));
}

}

}

await deleteDoc(doc(db,"categories",id));

}



/* ★カテゴリ編集（商品カテゴリも変更） */

window.editCategory=async function(cat){

const oldName=cat.name;

const name=prompt("カテゴリ名",cat.name);
if(name===null)return;

const image=prompt("画像URL",cat.image||"");

/* カテゴリ更新 */

await updateDoc(doc(db,"categories",cat.id),{

name,
image,
updatedAt:Date.now()

});


/* 商品カテゴリ名更新 */

const targetProducts=
products.filter(p=>p.category===oldName);

for(const p of targetProducts){

await updateDoc(doc(db,"products",p.id),{

category:name

});

}

}



window.moveCategoryUp=async id=>{

const s=[...categories].sort((a,b)=>a.order-b.order);

const i=s.findIndex(c=>c.id===id);

if(i<=0)return;

await updateDoc(doc(db,"categories",s[i].id),{order:s[i-1].order});
await updateDoc(doc(db,"categories",s[i-1].id),{order:s[i].order});

}



window.moveCategoryDown=async id=>{

const s=[...categories].sort((a,b)=>a.order-b.order);

const i=s.findIndex(c=>c.id===id);

if(i>=s.length-1)return;

await updateDoc(doc(db,"categories",s[i].id),{order:s[i+1].order});
await updateDoc(doc(db,"categories",s[i+1].id),{order:s[i].order});

}



function toggleCategory(name){

openCategories[name]=!openCategories[name];
renderProducts();

}



onSnapshot(query(collection(db,"categories"),orderBy("order")),snap=>{

categories=[];
productCategory.innerHTML="";

snap.forEach(d=>{

const data={id:d.id,...d.data()};
categories.push(data);

const opt=document.createElement("option");

opt.value=data.name;
opt.textContent=data.name;

productCategory.appendChild(opt);

});

renderProducts();

});



onSnapshot(query(collection(db,"products"),orderBy("order")),snap=>{

products=[];

snap.forEach(d=>{

products.push({id:d.id,...d.data()});

});

renderProducts();

});



function renderProducts(){

productList.innerHTML="";

categories.forEach(cat=>{

const header=document.createElement("div");

header.className="categoryHeader";

header.innerHTML=`

${openCategories[cat.name]?"▼":"▶"} ${cat.name}

<button onclick="moveCategoryUp('${cat.id}')">▲</button>
<button onclick="moveCategoryDown('${cat.id}')">▼</button>
<button onclick='editCategory(${JSON.stringify(cat)})'>編集</button>
<button onclick="deleteCategory('${cat.id}')">削除</button>

`;

header.onclick=()=>toggleCategory(cat.name);

productList.appendChild(header);


if(!openCategories[cat.name])return;


products

.filter(p=>p.category===cat.name)

.forEach(p=>{

const div=document.createElement("div");

div.className="item";

div.innerHTML=`

${p.name}

<button onclick="moveProductUp('${p.id}')">▲</button>
<button onclick="moveProductDown('${p.id}')">▼</button>
<button onclick='editProduct(${JSON.stringify(p)})'>編集</button>
<button onclick="deleteProduct('${p.id}')">削除</button>

`;

productList.appendChild(div);

});

});

}



checkAutoLogin()

</script>

</body>
</html>

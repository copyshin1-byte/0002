<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>00001</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:"Noto Sans JP",sans-serif;

color:#eafaff;

background:
linear-gradient(
120deg,
#020617,
#000814,
#001020,
#020617
);

background-size:400% 400%;

animation:bgmove 25s ease infinite;

min-height:100vh;

}

@keyframes bgmove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.header{

position:fixed;
top:0;
left:0;
right:0;

height:65px;

display:flex;
align-items:center;
justify-content:center;

background:#000;

border-bottom:1px solid #00eaff55;

box-shadow:0 0 40px #00eaff33;

z-index:100;

}

.logoText{

font-size:22px;
font-weight:bold;

background:linear-gradient(90deg,#00eaff,#00ff9d);
-webkit-background-clip:text;
color:transparent;

}

.container{

max-width:1400px;
margin:80px auto;
padding:15px;
display:flex;
gap:20px;

}

.panel{

position:relative;
background:rgba(0,0,0,.85);
border-radius:16px;
padding:16px;
overflow:hidden;

}

.panel::before{

content:"";
position:absolute;
inset:-2px;

background:
linear-gradient(60deg,#00eaff,#00ff9d,#00eaff);

background-size:300%;

animation:neonMove 6s linear infinite;

filter:blur(8px);
z-index:-1;

}

@keyframes neonMove{

0%{background-position:0%;}
100%{background-position:300%;}

}

.categories{width:250px;}
.products{width:420px;}
.detail{flex:1;}

.categoryBtn{

padding:12px;
margin:6px 0;

cursor:pointer;

border-radius:10px;

background:#020617;

border:1px solid #00eaff33;

}

.categoryBtn:hover{

background:#001020;
box-shadow:0 0 20px #00eaff55;

}

#searchBox{

width:100%;
padding:12px;

margin-bottom:12px;

background:#000;

border:1px solid #00eaff55;

color:#00eaff;

border-radius:10px;

}

.card{

position:relative;
display:flex;
gap:12px;
padding:14px;

margin-bottom:12px;

cursor:pointer;

border-radius:10px;

background:
linear-gradient(180deg,#001020,#000814);

border:1px solid #00eaff33;

overflow:hidden;

}

.card:hover{

background:
linear-gradient(180deg,#002030,#001020);

border:1px solid #00eaff;

box-shadow:0 0 30px #00eaff55;

}

.card img{

width:90px;
height:90px;

border-radius:8px;

object-fit:cover;

border:1px solid #00eaff44;

}

.title{

font-size:16px;
font-weight:bold;

}

.desc{

white-space:pre-line;
line-height:1.7;

}

.detail img{

width:100%;
border-radius:10px;
border:1px solid #00eaff44;
margin-top:10px;

}

.detail iframe{

width:100%;
height:320px;

margin-top:10px;

border-radius:10px;

border:1px solid #00eaff44;

}

@media(max-width:700px){

.container{
flex-direction:column;
margin-top:70px;
}

.categories,
.products{
width:100%;
}

.detail{
display:none;
}

}

</style>

</head>

<body>


<div class="header">
<div class="logoText">00001</div>
</div>



<div class="container">


<div class="panel categories">

<h3>カテゴリ</h3>

<div id="categoryList"></div>

</div>



<div class="panel products">

<input id="searchBox"
placeholder="検索"
oninput="searchAll()">

<div id="productList"></div>

</div>



<div class="panel detail">

<h3>商品説明</h3>

<div id="productDetail"></div>

</div>


</div>




<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain:"project-3088108151926999605.firebaseapp.com",
projectId:"project-3088108151926999605"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let categories=[];
let products=[];
let currentCategory=null;


const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const detail=document.getElementById("productDetail");


function renderCategories(){

categoryList.innerHTML="";

categories.forEach(c=>{

const div=document.createElement("div");

div.className="categoryBtn";

div.textContent=c.name;

div.onclick=()=>{

currentCategory=c.name;

renderProducts();

detail.innerHTML="";

};

categoryList.appendChild(div);

});

}


function renderProducts(){

productList.innerHTML="";

products

.filter(p=>p.category===currentCategory)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<img src="${p.image||""}">

<div>

<div class="title">${p.name}</div>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}


window.searchAll=function(){

const q=document
.getElementById("searchBox")
.value
.toLowerCase();


productList.innerHTML="";


products

.filter(p=>

p.category===currentCategory
&&
(p.name||"").toLowerCase().includes(q)

)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<img src="${p.image||""}">

<div>

<div class="title">${p.name}</div>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}


function showDetail(p){

let html=`

<h2>${p.name}</h2>

<div class="desc">${p.desc||""}</div>

`;

if(p.image)
html+=`<img src="${p.image}">`;

if(p.video)
html+=`<iframe src="${p.video}" allowfullscreen></iframe>`;


detail.innerHTML=html;

}


onSnapshot(collection(db,"categories"),s=>{

categories=s.docs.map(d=>d.data());
renderCategories();

});


onSnapshot(collection(db,"products"),s=>{

products=s.docs.map(d=>d.data());

});


</script>

</body>

</html>

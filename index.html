<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>00001</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#000814;
color:white;
}

.header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:black;
}

.container{
max-width:1200px;
margin:auto;
margin-top:10px;
display:flex;
gap:10px;
}

.panel{
background:#020617;
padding:10px;
border-radius:10px;
}

.categories{width:250px;}
.products{width:400px;}
.detail{flex:1;}

.categoryBtn{
padding:10px;
margin-bottom:5px;
cursor:pointer;
background:#001020;
border-radius:6px;
}

.card{
display:flex;
gap:10px;
padding:10px;
margin-bottom:10px;
cursor:pointer;
background:#001020;
border-radius:6px;
}

.desc{
white-space:pre-line;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
padding:20px;
overflow:auto;
}

</style>

</head>

<body>


<div class="header">
00001
</div>


<div class="container">

<div class="panel categories">

<div id="categoryList"></div>

</div>


<div class="panel products">

<input id="searchBox"
placeholder="検索"
oninput="searchAll()">

<div id="productList"></div>

</div>


<div class="panel detail">

<div id="productDetail">

商品選択

</div>

</div>

</div>


<div id="mobileModal" class="modal"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain:"project-3088108151926999605.firebaseapp.com",
projectId:"project-3088108151926999605"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let categories=[];
let products=[];
let currentCategory=null;


const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const detail=document.getElementById("productDetail");
const modal=document.getElementById("mobileModal");


function renderCategories(){

categoryList.innerHTML="";

categories.forEach(c=>{

const div=document.createElement("div");

div.className="categoryBtn";

div.textContent=c.name;

div.onclick=()=>{

currentCategory=c.name;

renderProducts();

};

categoryList.appendChild(div);

});

}



function renderProducts(){

productList.innerHTML="";

products
.filter(p=>

!currentCategory ||

p.category===currentCategory

)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<div>

<b>${p.name}</b>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}



window.searchAll=function(){

const q=document
.getElementById("searchBox")
.value
.toLowerCase();


productList.innerHTML="";

products
.filter(p=>

(!currentCategory ||

p.category===currentCategory)

&&

(p.name||"")
.toLowerCase()
.includes(q)

)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<div>

<b>${p.name}</b>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}



function showDetail(p){

let html=`

<h2>${p.name}</h2>

<div class="desc">${p.desc||""}</div>

`;

if(p.image)
html+=`<img src="${p.image}" width="100%">`;

if(p.video)
html+=`<iframe src="${p.video}" width="100%" height="300"></iframe>`;


if(window.innerWidth<700){

modal.style.display="block";
modal.innerHTML=html;

}else{

detail.innerHTML=html;

}

}



onSnapshot(collection(db,"categories"),s=>{

categories=s.docs.map(d=>d.data());
renderCategories();

});


onSnapshot(collection(db,"products"),s=>{

products=s.docs.map(d=>d.data());
renderProducts();

});


</script>

</body>

</html>

<!doctype html>
<html lang="ja">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>00001</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

:root{
--bg0:#000814;
--bg1:#020617;
--neon1:#00eaff;
--neon2:#00ff9d;
--txt:#eafaff;
--panel:rgba(0,0,0,.72);
}

body{
margin:0;
font-family:"Orbitron","Noto Sans JP",system-ui,sans-serif;
color:var(--txt);
background:
radial-gradient(1200px 800px at 15% 20%, rgba(0,234,255,.16), transparent 55%),
radial-gradient(900px 700px at 85% 30%, rgba(0,255,157,.12), transparent 60%),
linear-gradient(120deg,var(--bg1),var(--bg0),#001020,var(--bg1));
background-size: 100% 100%, 100% 100%, 400% 400%;
animation:bgmove 26s ease infinite;
min-height:100vh;
}

@keyframes bgmove{
0%{background-position:0% 0%, 0% 0%, 0% 50%;}
50%{background-position:0% 0%, 0% 0%, 100% 50%;}
100%{background-position:0% 0%, 0% 0%, 0% 50%;}
}

/* ===== Header ===== */
.header{
position:fixed;
top:0;left:0;right:0;
height:66px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(90deg,#000,rgba(2,6,23,.92),#000);
border-bottom:1px solid rgba(0,234,255,.35);
backdrop-filter: blur(10px);
box-shadow:0 0 40px rgba(0,234,255,.18);
z-index:100;
}

.logoText{
font-size:22px;
letter-spacing:4px;
font-weight:900;
background:linear-gradient(90deg,var(--neon1),var(--neon2));
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 18px rgba(0,234,255,.55);
}

/* ===== Layout ===== */
.container{
max-width:1500px;
margin:86px auto 0;
padding:14px;
display:flex;
gap:18px;
}

/* ===== Panels ===== */
.panel{
position:relative;
background:linear-gradient(180deg, rgba(10,20,40,.72), rgba(0,0,0,.78));
border-radius:18px;
padding:16px;
overflow:hidden;
box-shadow:
0 18px 45px rgba(0,0,0,.55),
inset 0 0 0 1px rgba(0,234,255,.18);
}

.panel::before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(60deg,var(--neon1),var(--neon2),var(--neon1));
background-size:300% 300%;
animation:neonBorder 6s linear infinite;
filter:blur(10px);
opacity:.9;
z-index:-1;
}

@keyframes neonBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.categories{width:270px;}
.products{width:440px;}
.detail{flex:1;}

/* Headings inside panels */
.panel h3{
margin:0 0 12px;
letter-spacing:2px;
font-size:14px;
color:rgba(234,250,255,.92);
text-shadow:0 0 14px rgba(0,234,255,.18);
}

/* ===== Category buttons ===== */
.categoryBtn{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin:8px 0;
cursor:pointer;
border-radius:12px;
border:1px solid rgba(0,234,255,.22);
background:linear-gradient(180deg, rgba(2,6,23,.9), rgba(0,0,0,.85));
transition:transform .18s, box-shadow .22s, border-color .22s, filter .22s;
position:relative;
overflow:hidden;
}

.categoryBtn::after{
content:"";
position:absolute;
top:0;left:-120%;
width:120%;
height:100%;
background:linear-gradient(90deg, transparent, rgba(255,255,255,.09), transparent);
transform:skewX(-18deg);
transition:left .7s;
}

.categoryBtn:hover::after{left:140%;}

.categoryBtn:hover{
transform:translateX(6px);
border-color:rgba(0,234,255,.55);
box-shadow:0 0 22px rgba(0,234,255,.35);
filter:brightness(1.05);
}

.categoryBtn:active{
transform:translateX(4px) scale(.98);
}

.categoryBtn img{
width:40px;height:40px;
object-fit:cover;
border-radius:10px;
border:1px solid rgba(0,234,255,.28);
box-shadow:0 0 18px rgba(0,234,255,.10);
}

/* ===== Search ===== */
#searchBox{
width:100%;
padding:12px 12px;
background:rgba(0,0,0,.78);
color:var(--neon1);
border:1px solid rgba(0,234,255,.35);
border-radius:12px;
outline:none;
margin:0 0 12px;
transition:border-color .2s, box-shadow .2s, filter .2s;
}

#searchBox:focus{
border-color:rgba(0,234,255,.75);
box-shadow:0 0 16px rgba(0,234,255,.35);
filter:brightness(1.05);
}

/* ===== Product cards: 3D Futuristic Panel ===== */
.card{
position:relative;
display:flex;
gap:12px;
padding:14px;
margin-bottom:14px;
cursor:pointer;

border-radius:16px;
border:1px solid transparent;

background:
linear-gradient(rgba(2,6,23,.92), rgba(0,0,0,.88)) padding-box,
linear-gradient(60deg,var(--neon1),var(--neon2),var(--neon1)) border-box;

transform:
perspective(900px)
rotateX(0deg)
translateZ(0);

transition:
transform .22s,
box-shadow .22s,
filter .18s;

overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:0;left:-110%;
width:110%;
height:2px;
background:linear-gradient(90deg, transparent, rgba(0,234,255,.95), transparent);
transition:left .6s;
}

.card:hover::before{left:110%;}

/* Glass reflection */
.card::after{
content:"";
position:absolute;
top:-60%;
left:-60%;
width:220%;
height:220%;
background:linear-gradient(120deg, transparent 42%, rgba(255,255,255,.16) 50%, transparent 58%);
transform:rotate(25deg);
opacity:0;
transition:opacity .2s, left 1s;
}

.card:hover::after{
left:130%;
opacity:1;
}

.card:hover{
transform:
perspective(900px)
rotateX(7deg)
translateY(-7px)
translateZ(22px);
box-shadow:
0 22px 45px rgba(0,0,0,.65),
0 0 42px rgba(0,234,255,.40);
filter:brightness(1.06);
}

.card:active{
transform:scale(.965);
box-shadow:0 0 60px rgba(0,234,255,.55);
filter:brightness(1.18);
}

.card img{
width:86px;height:86px;
object-fit:cover;
border-radius:12px;
border:1px solid rgba(0,234,255,.30);
box-shadow:0 0 20px rgba(0,234,255,.12);
}

.title{
font-size:16px;
font-weight:900;
letter-spacing:.5px;
margin:0 0 6px;
color:rgba(234,250,255,.96);
text-shadow:0 0 14px rgba(0,234,255,.15);
}

.desc{
white-space:pre-line;
line-height:1.75;
font-size:13px;
color:rgba(234,250,255,.82);
}

/* ===== Detail ===== */
.detail img{
width:100%;
border-radius:14px;
margin-bottom:12px;
border:1px solid rgba(0,234,255,.28);
box-shadow:0 0 30px rgba(0,234,255,.18);
}

iframe{
width:100%;
height:320px;
border:none;
border-radius:14px;
border:1px solid rgba(0,234,255,.28);
box-shadow:0 0 24px rgba(0,234,255,.14);
background:#000;
}

/* Detail enter animation */
.detail{
animation:detailShow .55s ease;
}
@keyframes detailShow{
0%{opacity:.35;transform:translateY(8px) scale(.985);}
100%{opacity:1;transform:translateY(0) scale(1);}
}

/* ===== Modal ===== */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:
radial-gradient(900px 700px at 20% 15%, rgba(0,234,255,.12), transparent 55%),
linear-gradient(180deg, rgba(0,0,0,.96), rgba(2,6,23,.96));
padding:20px;
overflow:auto;
display:none;
z-index:2000;
}

.modal img{
border-radius:14px;
border:1px solid rgba(0,234,255,.28);
box-shadow:0 0 30px rgba(0,234,255,.18);
}

/* Scrollbar */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:rgba(0,234,255,.85);border-radius:10px;}

/* ===== Mobile ===== */
@media(max-width:700px){

.container{
flex-direction:column;
margin-top:78px;
padding:12px;
gap:14px;
}

.categories,.products{width:100%;}

.detail{display:none;}

.categoryBtn{margin:0 0 10px;}

.card img{width:96px;height:96px;}

iframe{height:260px;}

.modal img{
max-width:100%;
max-height:45vh;
object-fit:contain;
}

}

</style>

</head>

<body>

<div class="header">
<div class="logoText">00001</div>
</div>

<div class="container">

<div class="panel categories">
<h3>CONTENTS</h3>
<div id="categoryList"></div>
</div>

<div class="panel products">

<h3>PRODUCT DATABASE</h3>

<input id="searchBox"
placeholder="SEARCH PRODUCT"
oninput="searchAll()">

<div id="productList"></div>

</div>

<div class="panel detail">

<h3>DETAIL INFO</h3>

<div id="productDetail">
SELECT PRODUCT
</div>

</div>

</div>

<div id="mobileModal" class="modal"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
query,
orderBy
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain: "project-3088108151926999605.firebaseapp.com",
projectId: "project-3088108151926999605",
storageBucket: "project-3088108151926999605.firebasestorage.app",
messagingSenderId: "331871777494",
appId: "1:331871777494:web:8de28a405de387f7240f77"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let categories=[];
let products=[];
let currentCategory=null;


const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const detail=document.getElementById("productDetail");
const mobileModal=document.getElementById("mobileModal");


function renderCategories(){

categoryList.innerHTML="";

categories.forEach(c=>{

const div=document.createElement("div");
div.className="categoryBtn";
div.onclick=()=>selectCategory(c);

div.innerHTML=`
<img src="${c.img||""}" onerror="this.style.display='none'">
<span>${c.name}</span>
`;

categoryList.appendChild(div);

});

}


function selectCategory(c){

currentCategory=c.id;
renderProducts();

}


function renderProducts(){

productList.innerHTML="";

const filtered=products
.filter(p=>!currentCategory||p.category===currentCategory);

filtered.forEach(p=>{

const div=document.createElement("div");
div.className="card";
div.onclick=()=>showDetail(p);

div.innerHTML=`
<img src="${p.img||""}" onerror="this.style.display='none'">
<div>
<div class="title">${p.name}</div>
<div class="desc">${p.desc||""}</div>
</div>
`;

productList.appendChild(div);

});

}


window.searchAll=function(){

const q=document.getElementById("searchBox").value.toLowerCase();

productList.innerHTML="";

products
.filter(p=>

(!currentCategory||p.category===currentCategory)
&&
(p.name||"").toLowerCase().includes(q)

)
.forEach(p=>{

const div=document.createElement("div");
div.className="card";
div.onclick=()=>showDetail(p);

div.innerHTML=`
<img src="${p.img||""}" onerror="this.style.display='none'">
<div>
<div class="title">${p.name}</div>
<div class="desc">${p.desc||""}</div>
</div>
`;

productList.appendChild(div);

});

}


function showDetail(p){

let html=`
<h2>${p.name}</h2>
<div class="desc">${p.desc||""}</div>
`;

if(p.img){
html+=`<img src="${p.img}">`;
}

if(p.video){
html+=`<iframe src="${p.video}" allowfullscreen></iframe>`;
}

if(window.innerWidth<700){

mobileModal.style.display="block";
mobileModal.innerHTML=`
<button onclick="closeModal()">CLOSE</button>
${html}
`;

}else{

detail.innerHTML=html;

}

}


window.closeModal=function(){

mobileModal.style.display="none";

};


const qCat=query(collection(db,"categories"),orderBy("order"));
const qPro=query(collection(db,"products"),orderBy("order"));


onSnapshot(qCat,snap=>{

categories=snap.docs.map(d=>({id:d.id,...d.data()}));
renderCategories();

});


onSnapshot(qPro,snap=>{

products=snap.docs.map(d=>d.data());
renderProducts();

});

</script>

</body>
</html>

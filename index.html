<!doctype html>
<html lang="ja">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>00001</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>

/* ===== Cyberpunk Deluxe UI (CSS only) ===== */

:root{
  --bg0:#020617;
  --bg1:#000814;
  --glass:rgba(4, 10, 24, .62);
  --glass2:rgba(0,0,0,.55);

  --ink:#eafaff;
  --muted:#a7c7ff;

  --c1:#00eaff;
  --c2:#00ffa6;
  --c3:#b100ff;
  --warn:#ff2bd6;

  --line:rgba(0,234,255,.22);
  --line2:rgba(177,0,255,.18);

  --shadow:0 18px 60px rgba(0,0,0,.55);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Orbitron","Noto Sans JP",system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 15% 10%, rgba(0,234,255,.12), transparent 60%),
    radial-gradient(900px 520px at 85% 15%, rgba(177,0,255,.12), transparent 55%),
    radial-gradient(900px 520px at 50% 110%, rgba(0,255,166,.10), transparent 55%),
    linear-gradient(160deg, var(--bg0), var(--bg1) 50%, #020617);
  min-height:100vh;
  overflow-x:hidden;
}

/* subtle grid */
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(to right, rgba(0,234,255,.06) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(177,0,255,.05) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:radial-gradient(circle at 40% 20%, black 0%, transparent 70%);
  opacity:.35;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0; left:0; right:0;
  height:72px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(90deg, rgba(0,0,0,.92), rgba(2,6,23,.75), rgba(0,0,0,.92));
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:
    0 10px 40px rgba(0,0,0,.6),
    0 0 28px rgba(0,234,255,.16);
  z-index:100;
}

.header:after{
  content:"";
  position:absolute;
  left:0; right:0; bottom:-1px;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(0,234,255,.85), rgba(0,255,166,.75), transparent);
  filter:drop-shadow(0 0 10px rgba(0,234,255,.55));
}

.logoText{
  font-size:22px;
  letter-spacing:4px;
  font-weight:900;
  text-transform:uppercase;
  background:linear-gradient(90deg, var(--c1), var(--c2));
  -webkit-background-clip:text;
  color:transparent;
  text-shadow:0 0 18px rgba(0,234,255,.35);
}

/* ===== Layout ===== */
.container{
  max-width:1560px;
  margin:92px auto 28px;
  padding:18px;
  display:flex;
  gap:18px;
}

.panel{
  background:
    linear-gradient(180deg, rgba(8,16,34,.75), rgba(0,0,0,.55));
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.panel:before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:18px;
  padding:2px;
  background:linear-gradient(135deg, rgba(0,234,255,.35), rgba(177,0,255,.25), rgba(0,255,166,.25));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
  opacity:.65;
}

.panel:after{
  content:"";
  position:absolute;
  top:-60%;
  left:-30%;
  width:90%;
  height:160%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
  transform:rotate(12deg);
  opacity:.12;
  pointer-events:none;
}

.categories{width:280px;}
.products{width:460px;}
.detail{flex:1;}

/* ===== Category Buttons ===== */
.categoryBtn{
  display:flex;
  align-items:center;
  gap:10px;

  padding:13px 12px;
  margin:8px 0;

  cursor:pointer;

  border:1px solid rgba(0,234,255,.20);
  border-radius:14px;

  background:
    linear-gradient(180deg, rgba(0,8,20,.85), rgba(2,6,23,.55));

  box-shadow:
    0 10px 30px rgba(0,0,0,.35),
    inset 0 0 0 1px rgba(255,255,255,.03);

  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
  user-select:none;
}

.categoryBtn img{
  width:26px;
  height:26px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid rgba(0,234,255,.30);
  box-shadow:0 0 12px rgba(0,234,255,.10);
}

.categoryBtn:hover{
  transform:translateX(6px);
  border-color:rgba(0,234,255,.75);
  box-shadow:
    0 14px 40px rgba(0,0,0,.5),
    0 0 26px rgba(0,234,255,.25);
  background:
    linear-gradient(90deg, rgba(0,234,255,.16), rgba(0,0,0,.55));
}

/* ===== Search ===== */
#searchBox{
  width:100%;
  padding:14px 14px;
  margin-bottom:14px;

  border-radius:14px;
  border:1px solid rgba(0,234,255,.28);

  background:
    radial-gradient(900px 160px at 20% 0%, rgba(0,234,255,.12), transparent 55%),
    rgba(0,0,0,.55);

  color:var(--ink);
  font-size:15px;
  outline:none;

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.02),
    0 10px 30px rgba(0,0,0,.35);
}

#searchBox::placeholder{ color:rgba(231,250,255,.55); }

#searchBox:focus{
  border-color:rgba(0,234,255,.85);
  box-shadow:
    0 0 0 4px rgba(0,234,255,.12),
    0 0 22px rgba(0,234,255,.25);
}

/* ===== Cards ===== */
.card{
  display:flex;
  gap:14px;
  padding:14px;
  margin-bottom:14px;

  border-radius:18px;
  cursor:pointer;

  border:1px solid rgba(0,234,255,.16);

  background:
    radial-gradient(800px 200px at 20% 0%, rgba(0,234,255,.10), transparent 60%),
    linear-gradient(180deg, rgba(0,10,30,.70), rgba(0,0,0,.55));

  box-shadow:
    0 14px 44px rgba(0,0,0,.45),
    inset 0 0 0 1px rgba(255,255,255,.02);

  position:relative;
  overflow:hidden;

  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}

.card:before{
  content:"";
  position:absolute;
  top:0; left:-120%;
  width:100%;
  height:2px;
  background:linear-gradient(90deg, transparent, rgba(0,234,255,.95), rgba(0,255,166,.85), transparent);
  filter:drop-shadow(0 0 10px rgba(0,234,255,.55));
  transition:left .55s ease;
}

.card:after{
  content:"";
  position:absolute;
  inset:-1px;
  background:radial-gradient(380px 160px at 85% 0%, rgba(177,0,255,.16), transparent 60%);
  opacity:.9;
  pointer-events:none;
}

.card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:rgba(0,234,255,.65);
  box-shadow:
    0 18px 62px rgba(0,0,0,.62),
    0 0 30px rgba(0,234,255,.22);
}
.card:hover:before{ left:120%; }

.card img{
  width:92px;
  height:92px;
  object-fit:cover;
  border-radius:14px;

  border:1px solid rgba(0,234,255,.35);
  box-shadow:
    0 0 18px rgba(0,234,255,.16),
    0 18px 40px rgba(0,0,0,.35);
}

.title{
  font-size:16px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:6px;
  color:var(--ink);
  text-shadow:0 0 12px rgba(0,234,255,.14);
}

.desc{
  font-family:"Noto Sans JP", system-ui;
  font-size:13px;
  line-height:1.55;
  color:rgba(231,250,255,.70);
}

/* ===== Detail ===== */
.detail img{
  width:100%;
  border-radius:18px;
  margin-bottom:14px;
  border:1px solid rgba(0,234,255,.22);
  box-shadow:
    0 0 26px rgba(0,234,255,.18),
    0 26px 70px rgba(0,0,0,.55);
}

iframe{
  width:100%;
  height:360px;
  border-radius:16px;
  border:1px solid rgba(0,234,255,.35);
  box-shadow:
    0 0 22px rgba(0,234,255,.18),
    0 18px 60px rgba(0,0,0,.55);
  background:#000;
}

/* ===== Modal ===== */
.modal{
  position:fixed;
  inset:0;
  display:none;
  z-index:2000;

  padding:22px;
  overflow:auto;

  background:
    radial-gradient(1100px 600px at 30% 10%, rgba(0,234,255,.14), transparent 60%),
    radial-gradient(900px 520px at 80% 15%, rgba(177,0,255,.12), transparent 55%),
    linear-gradient(180deg, rgba(0,0,0,.82), rgba(2,6,23,.92));

  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.modal img{
  max-width:100%;
  border-radius:18px;
  border:1px solid rgba(0,234,255,.22);
  box-shadow:
    0 0 26px rgba(0,234,255,.18),
    0 26px 70px rgba(0,0,0,.60);
}

/* scrollbars */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,.35);}
::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg, rgba(0,234,255,.85), rgba(0,255,166,.65));
  border-radius:999px;
}

/* ===== Mobile ===== */
@media(max-width:820px){
  .container{
    flex-direction:column;
    margin-top:86px;
    padding:12px;
    gap:12px;
  }

  .categories,.products{width:100%;}

  /* categories become horizontal rail */
  #categoryList{
    display:flex;
    gap:10px;
    overflow:auto;
    padding:4px 2px 10px;
    scroll-snap-type:x mandatory;
  }

  .categoryBtn{
    margin:0;
    min-width:160px;
    white-space:nowrap;
    scroll-snap-align:start;
    transform:none;
  }

  .categoryBtn:hover{ transform:none; }

  .detail{ display:none; }

  iframe{ height:280px; }

  .card img{ width:96px; height:96px; }
}


</style>

</head>

<body>

<div class="header">
<div class="logoText">00001</div>
</div>

<div class="container">

<div class="panel categories">
<h3>CONTENTS</h3>
<div id="categoryList"></div>
</div>

<div class="panel products">

<h3>PRODUCT DATABASE</h3>

<input id="searchBox"
placeholder="SEARCH PRODUCT"
oninput="searchAll()">

<div id="productList"></div>

</div>

<div class="panel detail">

<h3>DETAIL INFO</h3>

<div id="productDetail">
SELECT PRODUCT
</div>

</div>

</div>

<div id="mobileModal" class="modal"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
query,
orderBy
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain: "project-3088108151926999605.firebaseapp.com",
projectId: "project-3088108151926999605",
storageBucket: "project-3088108151926999605.firebasestorage.app",
messagingSenderId: "331871777494",
appId: "1:331871777494:web:8de28a405de387f7240f77"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let categories=[];
let products=[];
let currentCategory=null;


const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const productDetail=document.getElementById("productDetail");
const mobileModal=document.getElementById("mobileModal");


function getYoutubeID(url){

if(!url) return null;

if(url.includes("watch?v="))
return url.split("watch?v=")[1].split("&")[0];

if(url.includes("youtu.be/"))
return url.split("youtu.be/")[1];

return null;

}


function buildMedia(p){

let url=p.video||p.image;

if(!url) return "";

const yt=getYoutubeID(url);

if(yt){

return `<iframe src="https://www.youtube.com/embed/${yt}" allowfullscreen></iframe>`;

}

if(url.startsWith("http")){

return `<img src="${url}" style="max-width:100%;max-height:45vh;height:auto;object-fit:contain;">`;

}

return "";

}


/* ★カテゴリ画像表示 */

function renderCategories(){

categoryList.innerHTML="";

categories.forEach(cat=>{

let img="";

if(cat.image && cat.image.startsWith("http")){
img=`<img src="${cat.image}">`;
}

const div=document.createElement("div");

div.className="categoryBtn";

div.innerHTML=`
${img}
<span>${cat.name}</span>
`;

div.onclick=()=>{

currentCategory=cat.name;

renderProducts();

};

categoryList.appendChild(div);

});

}


function renderProducts(){

productList.innerHTML="";

products

.filter(p=>!currentCategory || p.category===currentCategory)

.forEach(p=>{

let img="";

if(p.image && p.image.startsWith("http")){

img=`<img src="${p.image}">`;

}

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
${img}
<div>${p.name}</div>
`;

card.onclick=()=>showDetail(p);

productList.appendChild(card);

});

}


function showDetail(p){

const media=buildMedia(p);

const description=p.desc||"";

const html=`

<h2>${p.name}</h2>

${media}

<br>

<div class="desc">${description}</div>

`;

if(window.innerWidth<700){

mobileModal.innerHTML=html;

mobileModal.style.display="block";

mobileModal.onclick=()=>mobileModal.style.display="none";

}else{

productDetail.innerHTML=html;

}

}


window.searchAll=function(){

const word=document.getElementById("searchBox").value.toLowerCase();

productList.innerHTML="";

products

.filter(p=>p.name.toLowerCase().includes(word))

.forEach(p=>{

let img="";

if(p.image && p.image.startsWith("http")){

img=`<img src="${p.image}">`;

}

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
${img}
<div>${p.name}</div>
`;

card.onclick=()=>showDetail(p);

productList.appendChild(card);

});

}


onSnapshot(query(collection(db,"categories"),orderBy("order")),snap=>{

categories=[];

snap.forEach(doc=>{
categories.push(doc.data());
});

renderCategories();

});


onSnapshot(query(collection(db,"products"),orderBy("order")),snap=>{

products=[];

snap.forEach(doc=>{
products.push(doc.data());
});

renderProducts();

});

</script>

</body>
</html>

<!doctype html>
<html lang="ja">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>00001</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">


<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{

font-family:"Noto Sans JP";

color:#eafaff;

background:
linear-gradient(120deg,#020617,#000814,#001020,#020617);

background-size:400% 400%;
animation:bgmove 25s ease infinite;

}

@keyframes bgmove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.header{

position:fixed;
top:0;
left:0;
right:0;

height:60px;

display:flex;
align-items:center;
justify-content:center;

background:#000;

border-bottom:1px solid #00eaff55;

}

.logoText{

font-size:20px;
font-weight:bold;

background:linear-gradient(90deg,#00eaff,#00ff9d);
-webkit-background-clip:text;
color:transparent;

}

.container{

max-width:1200px;
margin:70px auto 0;
padding:10px;

display:flex;
gap:15px;

}

.panel{

background:#000814;
padding:15px;
border-radius:10px;

border:1px solid #00eaff33;

}

.categories{width:250px;}
.products{width:400px;}
.detail{flex:1;}

.categoryBtn{

padding:10px;
margin-bottom:6px;

cursor:pointer;

background:#020617;

border-radius:8px;

border:1px solid #00eaff33;

}

.categoryBtn:hover{

background:#001020;

box-shadow:0 0 15px #00eaff;

}

#searchBox{

width:100%;
padding:10px;
margin-bottom:10px;

background:#000;

color:#00eaff;

border:1px solid #00eaff55;

border-radius:8px;

}

.card{

display:flex;
gap:10px;

padding:10px;

margin-bottom:10px;

cursor:pointer;

border-radius:8px;

background:#020617;

border:1px solid #00eaff33;

}

.card:hover{

box-shadow:0 0 20px #00eaff;

}

.card img{

width:80px;
height:80px;

object-fit:cover;

border-radius:8px;

}

.title{

font-weight:bold;

}

.desc{

white-space:pre-line;
font-size:14px;

}

.detail img{

width:100%;
border-radius:10px;

margin-top:10px;

}

iframe{

width:100%;
height:300px;

margin-top:10px;

border:none;

}

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:#000;

padding:20px;

display:none;

overflow:auto;

}

@media(max-width:700px){

.container{
flex-direction:column;
}

.categories,.products{
width:100%;
}

.detail{
display:none;
}

}

</style>

</head>

<body>

<div class="header">
<div class="logoText">00001</div>
</div>


<div class="container">


<div class="panel categories">

<h3>カテゴリ</h3>

<div id="categoryList"></div>

</div>


<div class="panel products">

<input id="searchBox"
placeholder="検索"
oninput="searchAll()">

<div id="productList"></div>

</div>


<div class="panel detail">

<div id="productDetail">

商品を選択

</div>

</div>


</div>


<div id="mobileModal" class="modal"></div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
query,
orderBy
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyDDhUgvH7o4SymhG3QVTRe6CDAlJM_Vk_A",
authDomain:"project-3088108151926999605.firebaseapp.com",
projectId:"project-3088108151926999605"

};


const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


let categories=[];
let products=[];
let currentCategory=null;


const categoryList=document.getElementById("categoryList");
const productList=document.getElementById("productList");
const detail=document.getElementById("productDetail");
const modal=document.getElementById("mobileModal");


function renderCategories(){

categoryList.innerHTML="";

categories.forEach(c=>{

const div=document.createElement("div");

div.className="categoryBtn";

div.textContent=c.name;

div.onclick=()=>{

currentCategory=c.id || c.name;
renderProducts();

};

categoryList.appendChild(div);

});

}



function renderProducts(){

productList.innerHTML="";

products

.filter(p=>

!currentCategory

||

p.category===currentCategory

||

p.categoryName===currentCategory

)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<img src="${p.img||""}">

<div>

<div class="title">${p.name}</div>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}



window.searchAll=function(){

const q=document
.getElementById("searchBox")
.value
.toLowerCase();


productList.innerHTML="";


products

.filter(p=>

(!currentCategory||

p.category===currentCategory||

p.categoryName===currentCategory)

&&

(p.name||"").toLowerCase().includes(q)

)

.forEach(p=>{

const div=document.createElement("div");

div.className="card";

div.onclick=()=>showDetail(p);

div.innerHTML=`

<img src="${p.img||""}">

<div>

<div class="title">${p.name}</div>

<div class="desc">${p.desc||""}</div>

</div>

`;

productList.appendChild(div);

});

}



function showDetail(p){

let html=`

<h2>${p.name}</h2>

<div class="desc">${p.desc||""}</div>

`;


if(p.img)
html+=`<img src="${p.img}">`;


if(p.video)
html+=`<iframe src="${p.video}" allowfullscreen></iframe>`;


if(window.innerWidth<700){

modal.style.display="block";
modal.innerHTML=html;

}else{

detail.innerHTML=html;

}

}



const q1=query(collection(db,"categories"),orderBy("order"));

const q2=query(collection(db,"products"),orderBy("order"));


onSnapshot(q1,s=>{

categories=s.docs.map(d=>({id:d.id,...d.data()}));
renderCategories();

});


onSnapshot(q2,s=>{

products=s.docs.map(d=>d.data());
renderProducts();

});


</script>

</body>

</html>
